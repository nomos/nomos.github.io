<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NAȚIONAL | NOMOS MEDIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e3e;
            --border: #1a1a1a;
            --text-muted: #666;
        }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }

        header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 40px;
        }

        .back {
            color: var(--accent);
            text-decoration: none;
            font-family: 'Fira Code', monospace;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 15px 0 5px 0;
            color: #fff;
        }

        /* Stil Card Unic NOMOS */
        .card-nomos {
            display: flex;
            gap: 25px;
            text-decoration: none;
            color: inherit;
            padding: 25px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
            background: #0a0a0a;
            align-items: center;
            position: relative;
        }

        .card-nomos:hover {
            border-color: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-label {
            position: absolute;
            top: -12px;
            left: 20px;
            background: var(--accent);
            color: #fff;
            font-family: 'Fira Code';
            font-size: 0.65rem;
            padding: 2px 10px;
            letter-spacing: 1px;
        }

        .card-img-wrapper {
            flex-shrink: 0;
            width: 300px;
            height: 200px;
            overflow: hidden;
            border: 1px solid #222;
        }

        .card-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(1) contrast(1.1);
        }

        .card-body { flex-grow: 1; }

        .card-meta {
            font-family: 'Fira Code';
            font-size: 0.7rem;
            color: var(--accent);
            margin-bottom: 10px;
            display: block;
        }

        .card-title {
            margin: 0 0 15px 0;
            font-family: 'Playfair Display';
            font-size: 1.8rem;
            line-height: 1.2;
            color: #fff;
        }

        .card-excerpt {
            margin: 0;
            font-size: 1rem;
            color: #999;
            line-height: 1.5;
        }

        /* Responsivitate Mobil */
        @media (max-width: 768px) {
            .card-nomos { flex-direction: column; align-items: flex-start; padding: 20px; }
            .card-img-wrapper { width: 100%; height: 220px; }
            .card-title { font-size: 1.5rem; }
            .card-label { top: 10px; left: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back">← ÎNAPOI LA PAGINA PRINCIPALĂ</a>
            <h1>Național</h1>
        </header>

        <section class="national-exclusive">
            <a href="articole/reconstructia-armatei.html" class="card-nomos">
                <span class="card-label">DOSAR SPECIAL</span>
                <div class="card-img-wrapper">
                    <img src="img/antrenament.jpg" alt="Antrenament">
                </div>
                <div class="card-body">
                    <span class="card-meta">APĂRARE // 16.6 MLD € // NOMOS EXCLUSIV</span>
                    <h3 class="card-title">RECONSTRUCȚIA: 16 miliarde € pentru noua armată</h3>
                    <p class="card-excerpt">Analiză asupra planului MApN pentru salvarea rezervei operaționale și integrarea tehnologiei NATO în arhitectura de apărare a României.</p>
                </div>
            </a>
        </section>
    </div>
</body>
</html>
